<html lang="en">
<head>
  <meta charset="UTF-8" />

</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><p style="color:#999;font-family:sans-serif">Loading…</p></div></div>
<script type="module">

import{useState,useEffect}from'https://esm.sh/preact@10/hooks';
import htm from'https://esm.sh/htm@3';
import{createClient}from'https://esm.sh/@supabase/supabase-js@2';
const html=htm.bind(h);

const SUPABASE_URL='https://fsarjuuqhvkzzddfxuet.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzYXJqdXVxaHZrenpkZGZ4dWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODUyMDAsImV4cCI6MjA5NzU2MTIwMH0.V838tlDfnHWOnF6RUNoDg3QAO4MlaYJ7gX8dE7X2Aa4';
const ADMIN_PASSWORD='landbridge2026';
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const STAGES=['New Lead','Contacted','Under Contract','Buyer Matched','Assigned / Closed'];
const CW=['Carroll','Paulding','Douglas','Haralson','Troup'];
const CS=['Decatur','Thomas','Lowndes','Dougherty','Colquitt'];
const ALL=[...CW,...CS];
const SC={'New Lead':'bg-slate-100 text-slate-700','Contacted':'bg-blue-100 text-blue-700','Under Contract':'bg-amber-100 text-amber-800','Buyer Matched':'bg-purple-100 text-purple-700','Assigned / Closed':'bg-emerald-100 text-emerald-700'};
const f$=n=>n!=null?`$${Number(n).toLocaleString()}`:'—';
const td=()=>new Date().toISOString().slice(0,10);

const Badge=({stage})=>html`<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${SC[stage]||'bg-gray-100 text-gray-600'}">${stage}</span>`;
const Card=({children,cls=''})=>html`<div class="bg-white rounded-2xl shadow-sm border border-stone-200 ${cls}">${children}</div>`;
const Spin=()=>html`<div class="flex justify-center py-16"><div class="spin w-8 h-8 border-4 border-amber-400 border-t-transparent rounded-full"></div></div>`;
const FI=({label,...p})=>html`<div class="flex flex-col gap-1">${label&&html`<label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">${label}</label>`}<input class="border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" ...${p}/></div>`;
const FS=({label,children,...p})=>html`<div class="flex flex-col gap-1">${label&&html`<label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">${label}</label>`}<select class="border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white" ...${p}>${children}</select></div>`;
const FT=({label,...p})=>html`<div class="flex flex-col gap-1">${label&&html`<label class="text-xs font-semibold text-stone-500 uppercase tracking-wide">${label}</label>`}<textarea class="border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white resize-none" rows="3" ...${p}></textarea></div>`;

function PasswordGate({onUnlock}){
  const[pw,set]=useState('');const[err,setE]=useState(false);
  const go=()=>{if(pw===ADMIN_PASSWORD)onUnlock();else{setE(true);set('');}};
  return html`<div class="min-h-screen bg-stone-900 flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl p-8 w-full max-w-xs shadow-xl text-center">
      <div class="text-4xl mb-3">🔐</div>
      <h2 class="text-lg font-bold text-stone-800 mb-1">Admin Access</h2>
      <p class="text-stone-400 text-sm mb-5">Enter your password</p>
      <input type="password" placeholder="Password" value=${pw} onInput=${e=>{set(e.target.value);setE(false);}} onKeyDown=${e=>e.key==='Enter'&&go()} class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-amber-400"/>
      ${err&&html`<p class="text-red-500 text-xs mb-2">Incorrect password.</p>`}
      <button onClick=${go} class="w-full bg-amber-400 hover:bg-amber-500 text-stone-900 font-bold py-2.5 rounded-xl text-sm">Enter Dashboard</button>
    </div>
  </div>`;
}

function SellerPage({onSubmit}){
  const[f,sF]=useState({name:'',phone:'',county:'',acres:'',askingPrice:'',notes:''});
  const[done,setD]=useState(false);const[saving,setS]=useState(false);
  const set=k=>e=>sF(p=>({...p,[k]:e.target.value}));
  const go=async()=>{
    if(!f.name||!f.phone||!f.county)return alert('Please fill in name, phone, and county.');
    setS(true);await onSubmit({...f,acres:parseFloat(f.acres)||0,askingPrice:parseFloat(f.askingPrice)||0});setS(false);setD(true);
  };
  if(done)return html`<div class="min-h-screen flex items-center justify-center bg-stone-50 p-6"><div class="text-center"><div class="text-5xl mb-4">✅</div><h2 class="text-2xl font-bold text-stone-800 mb-2">We received your info.</h2><p class="text-stone-500">Someone from our team will reach out within 24 hours.</p></div></div>`;
  return html`<div class="min-h-screen bg-stone-50">
    <div class="bg-stone-900 text-white px-6 py-16 text-center">
      <p class="text-amber-400 text-xs font-bold uppercase tracking-widest mb-3">Three Sisters Land Bridge — Georgia</p>
      <h1 class="text-4xl font-extrabold leading-tight mb-4">Sell Your Land.<br/>Fast, Simple, Cash.</h1>
      <p class="text-stone-400 text-base max-w-sm mx-auto">No listings. No agents. No waiting.</p>
    </div>
    <div class="bg-amber-400 px-6 py-3 flex justify-center gap-8 text-stone-900 text-xs font-bold uppercase tracking-wide flex-wrap">
      <span>✓ No Agent Fees</span><span>✓ Cash Offers</span><span>✓ Close in 30 Days</span>
    </div>
    <div class="max-w-lg mx-auto px-6 py-10">
      <${Card} cls="p-6">
        <h2 class="text-lg font-bold text-stone-800 mb-1">Tell us about your land</h2>
        <p class="text-stone-400 text-sm mb-6">Fill this out and we'll be in touch within 24 hours.</p>
        <div class="grid grid-cols-1 gap-4">
          <${FI} label="Full Name *" placeholder="John Smith" value=${f.name} onInput=${set('name')}/>
          <${FI} label="Phone Number *" placeholder="229-555-0000" type="tel" value=${f.phone} onInput=${set('phone')}/>
          <${FS} label="County *" value=${f.county} onChange=${set('county')}>
            <option value="">Select county…</option>
            <optgroup label="West Georgia">${CW.map(c=>html`<option>${c}</option>`)}</optgroup>
            <optgroup label="Southwest Georgia">${CS.map(c=>html`<option>${c}</option>`)}</optgroup>
          <//>
          <div class="grid grid-cols-2 gap-4">
            <${FI} label="Approx. Acres" placeholder="10" type="number" value=${f.acres} onInput=${set('acres')}/>
            <${FI} label="Asking Price ($)" placeholder="50000" type="number" value=${f.askingPrice} onInput=${set('askingPrice')}/>
          </div>
          <${FT} label="Anything else?" placeholder="Inherited land, behind on taxes…" value=${f.notes} onInput=${set('notes')}/>
        </div>
        <button onClick=${go} disabled=${saving} class="mt-6 w-full bg-amber-400 hover:bg-amber-500 disabled:opacity-60 text-stone-900 font-bold py-3 rounded-xl text-sm">${saving?'Sending…':'Get My Cash Offer →'}</button>
        <p class="text-center text-xs text-stone-400 mt-3">No obligation. We don't share your info.</p>
      <//>
    </div>
  </div>`;
}

function BuyerPage({onSubmit}){
  const[f,sF]=useState({name:'',contact:'',phone:'',email:'',minAcres:'',maxBudget:'',counties:[]});
  const[done,setD]=useState(false);const[saving,setS]=useState(false);
  const set=k=>e=>sF(p=>({...p,[k]:e.target.value}));
  const tog=c=>sF(p=>({...p,counties:p.counties.includes(c)?p.counties.filter(x=>x!==c):[...p.counties,c]}));
  const go=async()=>{
    if(!f.name||!f.contact||!f.phone)return alert('Please fill in company name, contact, and phone.');
    setS(true);await onSubmit({...f,minAcres:parseFloat(f.minAcres)||0,maxBudget:parseFloat(f.maxBudget)||0});setS(false);setD(true);
  };
  if(done)return html`<div class="min-h-screen flex items-center justify-center bg-stone-50 p-6"><div class="text-center"><div class="text-5xl mb-4">🤝</div><h2 class="text-2xl font-bold text-stone-800 mb-2">You're on the list.</h2><p class="text-stone-500">We'll reach out when we have a deal that fits.</p></div></div>`;
  return html`<div class="min-h-screen bg-stone-50">
    <div class="bg-stone-900 text-white px-6 py-14 text-center">
      <p class="text-amber-400 text-xs font-bold uppercase tracking-widest mb-3">Three Sisters Land Bridge — Builders & Investors</p>
      <h1 class="text-3xl font-extrabold mb-3">Get Off-Market Land Deals First</h1>
      <p class="text-stone-400 text-sm max-w-sm mx-auto">Motivated sellers in your target counties before the property hits the market.</p>
    </div>
    <div class="max-w-lg mx-auto px-6 py-10">
      <${Card} cls="p-6">
        <h2 class="text-lg font-bold text-stone-800 mb-1">Join the buyer list</h2>
        <p class="text-stone-400 text-sm mb-6">Tell us what you're looking for.</p>
        <div class="grid grid-cols-1 gap-4">
          <${FI} label="Company Name *" placeholder="Smith Douglas Homes" value=${f.name} onInput=${set('name')}/>
          <${FI} label="Your Name *" placeholder="Marcus Powell" value=${f.contact} onInput=${set('contact')}/>
          <${FI} label="Phone *" placeholder="770-555-0000" type="tel" value=${f.phone} onInput=${set('phone')}/>
          <${FI} label="Email" placeholder="you@company.com" type="email" value=${f.email} onInput=${set('email')}/>
          <div class="grid grid-cols-2 gap-4">
            <${FI} label="Min Acres" placeholder="5" type="number" value=${f.minAcres} onInput=${set('minAcres')}/>
            <${FI} label="Max Budget ($)" placeholder="250000" type="number" value=${f.maxBudget} onInput=${set('maxBudget')}/>
          </div>
          <div>
            <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide block mb-2">Target Counties</label>
            <div class="flex flex-wrap gap-2">${ALL.map(c=>html`<button onClick=${()=>tog(c)} class="px-3 py-1 rounded-full text-xs font-semibold border ${f.counties.includes(c)?'bg-amber-400 border-amber-400 text-stone-900':'bg-white border-stone-300 text-stone-600'}">${c}</button>`)}</div>
          </div>
        </div>
        <button onClick=${go} disabled=${saving} class="mt-6 w-full bg-amber-400 hover:bg-amber-500 disabled:opacity-60 text-stone-900 font-bold py-3 rounded-xl text-sm">${saving?'Saving…':'Get Deal Alerts →'}</button>
      <//>
    </div>
  </div>`;
}

function DealModal({deal,onSave,onClose,saving}){
  const[f,sF]=useState(deal||{sellerName:'',county:'',acres:'',contractPrice:'',assignFee:'',buyerName:'',stage:'Under Contract',contractDate:td(),notes:''});
  const set=k=>e=>sF(p=>({...p,[k]:e.target.value}));
  const cp=parseFloat(f.contractPrice)||0,af=parseFloat(f.assignFee)||0;
  return html`<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <${Card} cls="w-full max-w-lg p-6" style="max-height:90vh;overflow-y:auto">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-lg font-bold text-stone-800">${deal?'Edit Deal':'New Deal'}</h3>
        <button onClick=${onClose} class="text-stone-400 text-xl">✕</button>
      </div>
      <div class="grid grid-cols-1 gap-4">
        <${FI} label="Seller Name *" value=${f.sellerName} onInput=${set('sellerName')}/>
        <${FS} label="County *" value=${f.county} onChange=${set('county')}>
          <option value="">Select county…</option>${ALL.map(c=>html`<option>${c}</option>`)}
        <//>
        <div class="grid grid-cols-3 gap-3">
          <${FI} label="Acres" type="number" value=${f.acres} onInput=${set('acres')}/>
          <${FI} label="Contract $" type="number" value=${f.contractPrice} onInput=${set('contractPrice')}/>
          <${FI} label="Assign Fee $" type="number" value=${f.assignFee} onInput=${set('assignFee')}/>
        </div>
        ${(cp>0||af>0)&&html`<div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm">
          <div class="flex justify-between text-stone-600"><span>Buyer pays</span><span class="font-semibold">${f$(cp+af)}</span></div>
          <div class="flex justify-between text-stone-600"><span>Seller gets</span><span class="font-semibold">${f$(cp)}</span></div>
          <div class="flex justify-between text-emerald-700 font-bold border-t border-amber-200 mt-2 pt-2"><span>Your fee</span><span>${f$(af)}</span></div>
        </div>`}
        <${FI} label="Buyer Company" value=${f.buyerName||''} onInput=${set('buyerName')} placeholder="Smith Douglas Homes"/>
        <${FS} label="Stage" value=${f.stage} onChange=${set('stage')}>${STAGES.map(s=>html`<option>${s}</option>`)}<//>
        <${FI} label="Contract Date" type="date" value=${f.contractDate} onInput=${set('contractDate')}/>
        <${FT} label="Notes" value=${f.notes} onInput=${set('notes')}/>
      </div>
      <div class="flex gap-3 mt-6">
        <button onClick=${()=>onSave(f)} disabled=${saving} class="flex-1 bg-amber-400 hover:bg-amber-500 disabled:opacity-60 text-stone-900 font-bold py-2.5 rounded-xl text-sm">${saving?'Saving…':'Save Deal'}</button>
        <button onClick=${onClose} class="px-4 py-2.5 border border-stone-300 rounded-xl text-sm text-stone-600">Cancel</button>
      </div>
    <//>
  </div>`;
}

function Pipeline({deals,loading,onEdit,onAdd,onStage}){
  const total=deals.reduce((s,d)=>s+(d.assignFee||0),0);
  const closed=deals.filter(d=>d.stage==='Assigned / Closed').reduce((s,d)=>s+(d.assignFee||0),0);
  const active=deals.filter(d=>d.stage!=='Assigned / Closed').length;
  return html`<div>
    <div class="grid grid-cols-3 gap-4 mb-6">
      ${[['Active',active],['Pipeline',f$(total)],['Closed',f$(closed)]].map(([l,v])=>html`<${Card} cls="p-4 text-center"><div class="text-2xl font-extrabold text-stone-800">${v}</div><div class="text-xs text-stone-400 font-semibold uppercase tracking-wide mt-0.5">${l}</div><//>` )}
    </div>
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-stone-800">Deal Pipeline</h2>
      <button onClick=${onAdd} class="bg-amber-400 hover:bg-amber-500 text-stone-900 font-bold px-4 py-2 rounded-xl text-sm">+ New Deal</button>
    </div>
    ${loading?html`<${Spin}/>`:deals.length===0?html`<${Card} cls="p-10 text-center text-stone-400"><div class="text-3xl mb-2">📋</div><p class="text-sm">No deals yet.</p><//>`:html`<div class="space-y-3">${deals.map(d=>html`<${Card} key=${d.id} cls="p-4">
      <div class="flex justify-between items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap mb-1">
            <span class="font-bold text-stone-800 text-sm">${d.sellerName}</span>
            <span class="text-stone-400 text-xs">·</span>
            <span class="text-stone-500 text-xs">${d.county} Co. · ${d.acres} ac</span>
          </div>
          <div class="flex items-center gap-3 flex-wrap">
            <${Badge} stage=${d.stage}/>
            ${d.assignFee>0&&html`<span class="text-emerald-600 text-xs font-bold">Fee: ${f$(d.assignFee)}</span>`}
            ${d.buyerName&&html`<span class="text-purple-600 text-xs">→ ${d.buyerName}</span>`}
          </div>
          ${d.notes&&html`<p class="text-xs text-stone-400 mt-1.5 truncate">${d.notes}</p>`}
        </div>
        <div class="flex flex-col gap-1.5 shrink-0">
          <button onClick=${()=>onEdit(d)} class="text-xs border border-stone-300 rounded-lg px-3 py-1 text-stone-600">Edit</button>
          <select value=${d.stage} onChange=${e=>onStage(d.id,e.target.value)} class="text-xs border border-stone-300 rounded-lg px-2 py-1 bg-white text-stone-600">
            ${STAGES.map(s=>html`<option>${s}</option>`)}
          </select>
        </div>
      </div>
    <//>`)}</div>`}
  </div>`;
}

function SellersV({sellers,loading}){
  return html`<div>
    <h2 class="text-lg font-bold text-stone-800 mb-4">Seller Leads (${sellers.length})</h2>
    ${loading?html`<${Spin}/>`:sellers.length===0?html`<${Card} cls="p-10 text-center text-stone-400 text-sm">No seller leads yet. Share your link to start collecting them.<//>`:html`<div class="space-y-3">${sellers.map(s=>html`<${Card} key=${s.id} cls="p-4">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-bold text-stone-800 text-sm">${s.name}</div>
          <div class="text-xs text-stone-500 mt-0.5">${s.phone} · ${s.county} Co. · ${s.acres} acres</div>
          ${s.askingPrice>0&&html`<div class="text-xs text-stone-500">Asking ${f$(s.askingPrice)}</div>`}
          ${s.notes&&html`<div class="text-xs text-stone-400 mt-1">${s.notes}</div>`}
        </div>
        <div class="text-xs text-stone-300 shrink-0 ml-4">${s.submitted}</div>
      </div>
    <//>`)}</div>`}
  </div>`;
}

function BuyersV({buyers,loading}){
  return html`<div>
    <h2 class="text-lg font-bold text-stone-800 mb-4">Buyer List (${buyers.length})</h2>
    ${loading?html`<${Spin}/>`:buyers.length===0?html`<${Card} cls="p-10 text-center text-stone-400 text-sm">No buyers yet.<//>`:html`<div class="space-y-3">${buyers.map(b=>html`<${Card} key=${b.id} cls="p-4">
      <div class="font-bold text-stone-800 text-sm">${b.name}</div>
      <div class="text-xs text-stone-500 mt-0.5">${b.contact} · ${b.phone}</div>
      ${b.email&&html`<div class="text-xs text-stone-500">${b.email}</div>`}
      <div class="flex flex-wrap gap-1.5 mt-2">${(b.counties||[]).map(c=>html`<span class="bg-amber-50 border border-amber-200 text-amber-800 text-xs px-2 py-0.5 rounded-full">${c}</span>`)}</div>
      <div class="text-xs text-stone-400 mt-1.5">Min ${b.minAcres} ac · Budget up to ${f$(b.maxBudget)}</div>
    <//>`)}</div>`}
  </div>`;
}

function Calc(){
  const[cp,sC]=useState('');const[sp,sS]=useState('');
  const fee=(parseFloat(sp)||0)-(parseFloat(cp)||0);
  const margin=sp&&cp?((fee/(parseFloat(sp)||1))*100).toFixed(1):null;
  return html`<div>
    <h2 class="text-lg font-bold text-stone-800 mb-1">Assignment Fee Calculator</h2>
    <p class="text-stone-400 text-sm mb-6">Enter your contract price and the price you're assigning to your buyer.</p>
    <${Card} cls="p-6 max-w-sm">
      <div class="space-y-4">
        <${FI} label="Your Contract Price (from Seller)" type="number" placeholder="36000" value=${cp} onInput=${e=>sC(e.target.value)}/>
        <${FI} label="Assignment Price (to Buyer)" type="number" placeholder="45000" value=${sp} onInput=${e=>sS(e.target.value)}/>
      </div>
      ${fee>0&&html`<div class="mt-5 bg-emerald-50 border border-emerald-200 rounded-xl p-4 space-y-2">
        <div class="flex justify-between text-sm text-stone-600"><span>Buyer pays</span><span class="font-semibold">${f$(sp)}</span></div>
        <div class="flex justify-between text-sm text-stone-600"><span>Seller gets</span><span class="font-semibold">${f$(cp)}</span></div>
        <div class="border-t border-emerald-200 pt-2 flex justify-between text-emerald-700 font-extrabold text-base"><span>Your Fee</span><span>${f$(fee)}</span></div>
        ${margin&&html`<div class="text-xs text-emerald-600 text-right">${margin}% margin</div>`}
      </div>`}
      ${fee<0&&cp&&sp&&html`<p class="text-red-500 text-sm mt-4">⚠️ Sale price is below contract — you'd lose money.</p>`}
    <//>
    <div class="mt-8 max-w-lg">
      <h3 class="font-bold text-stone-700 mb-3 text-sm">How assignment works</h3>
      <div class="space-y-3">
        ${[['1','Get the seller under contract','Sign a purchase agreement at below-market price. Include an assignment clause.'],
           ['2','Find your buyer','Reach out to your builder list with the details and your assignment price.'],
           ['3','Assign the contract','Sign an Assignment of Contract. Buyer pays your fee at closing.'],
           ['4','Close & collect','Title company handles the rest. You never own the land.'],
        ].map(([n,t,d])=>html`<div class="flex gap-3"><div class="w-7 h-7 rounded-full bg-amber-400 text-stone-900 font-extrabold text-xs flex items-center justify-center shrink-0 mt-0.5">${n}</div><div><div class="font-semibold text-stone-700 text-sm">${t}</div><div class="text-stone-400 text-xs mt-0.5">${d}</div></div></div>`)}
      </div>
    </div>
  </div>`;
}

function App(){
  const[view,sV]=useState('public-seller');
  const[unlocked,sU]=useState(false);
  const[sellers,sS]=useState([]);
  const[buyers,sB]=useState([]);
  const[deals,sD]=useState([]);
  const[loading,sL]=useState(false);
  const[modal,sM]=useState(null);
  const[mSaving,sMsave]=useState(false);
  const isPublic=view==='public-seller'||view==='public-buyer';

  useEffect(()=>{if(unlocked)load();},[unlocked]);

  const load=async()=>{
    sL(true);
    const[s,b,d]=await Promise.all([
      db.from('sellers').select('*').order('created_at',{ascending:false}),
      db.from('buyers').select('*').order('created_at',{ascending:false}),
      db.from('deals').select('*').order('created_at',{ascending:false}),
    ]);
    sS((s.data||[]).map(r=>({id:r.id,name:r.name,phone:r.phone,county:r.county,acres:r.acres,askingPrice:r.asking_price,notes:r.notes,submitted:r.submitted||r.created_at?.slice(0,10)})));
    sB((b.data||[]).map(r=>({id:r.id,name:r.name,contact:r.contact,phone:r.phone,email:r.email,counties:r.counties||[],minAcres:r.min_acres,maxBudget:r.max_budget})));
    sD((d.data||[]).map(r=>({id:r.id,sellerName:r.seller_name,county:r.county,acres:r.acres,contractPrice:r.contract_price,assignFee:r.assign_fee,buyerName:r.buyer_name,stage:r.stage,contractDate:r.contract_date,notes:r.notes})));
    sL(false);
  };

  const addSeller=async d=>{await db.from('sellers').insert([{name:d.name,phone:d.phone,county:d.county,acres:d.acres,asking_price:d.askingPrice,notes:d.notes}]);};
  const addBuyer=async d=>{await db.from('buyers').insert([{name:d.name,contact:d.contact,phone:d.phone,email:d.email,counties:d.counties,min_acres:d.minAcres,max_budget:d.maxBudget}]);};
  const saveDeal=async d=>{
    sMsave(true);
    const p={seller_name:d.sellerName,county:d.county,acres:parseFloat(d.acres)||0,contract_price:parseFloat(d.contractPrice)||0,assign_fee:parseFloat(d.assignFee)||0,buyer_name:d.buyerName||null,stage:d.stage,contract_date:d.contractDate||null,notes:d.notes||null};
    if(d.id)await db.from('deals').update(p).eq('id',d.id);
    else await db.from('deals').insert([p]);
    await load();sMsave(false);sM(null);
  };
  const stageChange=async(id,stage)=>{
    await db.from('deals').update({stage}).eq('id',id);
    sD(ds=>ds.map(d=>d.id===id?{...d,stage}:d));
  };

  const goAdmin=()=>{if(unlocked)sV('pipeline');else sV('admin-lock');};
  if(view==='admin-lock')return html`<${PasswordGate} onUnlock=${()=>{sU(true);sV('pipeline');}}/>`;

  const ANAV=[{key:'pipeline',label:'Pipeline'},{key:'sellers',label:`Sellers (${sellers.length})`},{key:'buyers',label:`Buyers (${buyers.length})`},{key:'calc',label:'Fee Calc'}];
  const PNAV=[{key:'public-seller',label:'Sell Land'},{key:'public-buyer',label:'Buy Land'}];

  return html`<div class="min-h-screen bg-stone-50">
    <div class="bg-stone-900 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
      <div>
        <span class="text-white font-extrabold text-sm tracking-tight">Three Sisters Land Bridge</span>
        <span class="text-amber-400 text-xs ml-1.5 font-semibold">Georgia</span>
      </div>
      <button onClick=${isPublic?goAdmin:()=>sV('public-seller')} class="text-xs px-3 py-1.5 rounded-lg font-semibold ${!isPublic?'bg-amber-400 text-stone-900':'text-stone-300 border border-stone-600'}">
        ${isPublic?'Admin →':'← Public Site'}
      </button>
    </div>
    <div class="bg-stone-800 px-4 flex gap-1 overflow-x-auto">
      ${(isPublic?PNAV:ANAV).map(n=>html`<button key=${n.key} onClick=${()=>sV(n.key)} class="py-2.5 px-4 text-xs font-bold whitespace-nowrap border-b-2 ${view===n.key?'border-amber-400 text-amber-400':'border-transparent text-stone-400'}">${n.label}</button>`)}
    </div>
    ${isPublic?html`<${Fragment}>
      ${view==='public-seller'&&html`<${SellerPage} onSubmit=${addSeller}/>`}
      ${view==='public-buyer'&&html`<${BuyerPage} onSubmit=${addBuyer}/>`}
    <//>`:html`<div class="max-w-2xl mx-auto px-4 py-6">
      ${view==='pipeline'&&html`<${Pipeline} deals=${deals} loading=${loading} onEdit=${d=>sM(d)} onAdd=${()=>sM({})} onStage=${stageChange}/>`}
      ${view==='sellers'&&html`<${SellersV} sellers=${sellers} loading=${loading}/>`}
      ${view==='buyers'&&html`<${BuyersV} buyers=${buyers} loading=${loading}/>`}
      ${view==='calc'&&html`<${Calc}/>`}
    </div>`}
    ${modal!==null&&html`<${DealModal} deal=${modal.id?modal:null} saving=${mSaving} onSave=${saveDeal} onClose=${()=>sM(null)}/>`}
  </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
